name: OFI ダッシュボード更新

on:
  workflow_dispatch:
    # スマホから手動でも実行できるようにする（自動更新はVPS cronに移行済み）

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: ダッシュボードを生成
        run: python create_dashboard.py
        env:
          PORTFOLIO_CSV_URL: ${{ secrets.PORTFOLIO_CSV_URL }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}

      - name: 履歴ログをmainにコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          git diff --staged --quiet || git commit -m "📈 OFIスナップショット自動保存"
          git push

      - name: GitHub Pages にデプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: '📊 ダッシュボード自動更新'
