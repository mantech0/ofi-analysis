name: OFI ダッシュボード更新

on:
  schedule:
    # 30分前倒し＋端数分でGitHub混雑を回避（実際の到達は目標時刻±15分程度）
    # 8:00〜9:30はJST→UTC日付をまたぐため day=0-4（UTC日-木）
    - cron: '28 22 * * 0-4'  # →  8:00 JST 月-金
    - cron: '44 23 * * 0-4'  # →  9:15 JST 月-金
    - cron: '59 23 * * 0-4'  # →  9:30 JST 月-金
    # 10:30以降はJST＝UTC同日のため day=1-5（UTC月-金）
    - cron: '3 1 * * 1-5'    # → 10:30 JST 月-金
    - cron: '7 2 * * 1-5'    # → 11:35 JST 月-金
    - cron: '3 4 * * 1-5'    # → 13:30 JST 月-金
    - cron: '3 5 * * 1-5'    # → 14:30 JST 月-金
    - cron: '17 6 * * 1-5'   # → 15:45 JST 月-金
    # 米国市場時間帯（22:30〜26:00 JST = 13:30〜17:00 UTC 同日）
    - cron: '58 12 * * 1-5'  # → 22:30 JST 月-金
    - cron: '28 13 * * 1-5'  # → 23:00 JST 月-金
    - cron: '58 13 * * 1-5'  # → 23:30 JST 月-金
    - cron: '28 14 * * 1-5'  # → 24:00 JST 月-金
    - cron: '28 15 * * 1-5'  # → 25:00 JST 月-金
    - cron: '28 16 * * 1-5'  # → 26:00 JST 月-金
    - cron: '30 21 * * 5'   # →  6:30 JST 土（米国市場引け後の週次確認）
  workflow_dispatch:
    # スマホから手動でも実行できるようにする

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: ダッシュボードを生成
        run: python create_dashboard.py
        env:
          PORTFOLIO_CSV_URL: ${{ secrets.PORTFOLIO_CSV_URL }}

      - name: 履歴ログをmainにコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          git diff --staged --quiet || git commit -m "📈 OFIスナップショット自動保存"
          git push

      - name: GitHub Pages にデプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: '📊 ダッシュボード自動更新'
