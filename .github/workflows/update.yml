name: OFI ダッシュボード更新

on:
  schedule:
    # JST = UTC+9  /  平日(月-金) = UTC 1-5
    - cron: '0 23 * * 1-5'   #  8:00 JST 火-土（米国市場確認、UTC月-金）
    - cron: '15 0 * * 1-5'   #  9:15 JST
    - cron: '30 0 * * 1-5'   #  9:30 JST
    - cron: '30 1 * * 1-5'   # 10:30 JST
    - cron: '35 2 * * 1-5'   # 11:35 JST
    - cron: '30 4 * * 1-5'   # 13:30 JST
    - cron: '30 5 * * 1-5'   # 14:30 JST
    - cron: '45 6 * * 1-5'   # 15:45 JST
  workflow_dispatch:
    # スマホから手動でも実行できるようにする

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: ダッシュボードを生成
        run: python create_dashboard.py
        env:
          PORTFOLIO_CSV_URL: ${{ secrets.PORTFOLIO_CSV_URL }}

      - name: GitHub Pages にデプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: '📊 ダッシュボード自動更新'
